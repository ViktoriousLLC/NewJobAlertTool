# Dependabot config — auto-opens dependency-update PRs for the two npm projects.
#
# Tuned 2026-05-31 (v2): group ONLY minor + patch into one PR per ecosystem per
# weekly run, and IGNORE major version bumps entirely. Majors (e.g. Express 4->5,
# Resend 4->6, Puppeteer 24->25) carry breaking changes and, for Puppeteer, must
# stay in lockstep with the pinned Docker Chrome image — so they get deliberate,
# individually-tested upgrades, not an auto-PR. The Monday admin npm-audit digest
# still surfaces security deltas (including in major-version-behind deps) as the
# "notice it" signal. See backend/src/jobs/JOBS.md (Dependency Health) and
# backend/src/scraper/SCRAPER.md (Puppeteer must be pinned exact to the Docker image).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "frontend"
    groups:
      all-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # puppeteer is pinned EXACT to match the Docker image's bundled Chrome
      # (SCRAPER.md) — ANY bump breaks the scrapers, so never raise it.
      - dependency-name: "puppeteer*"

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "backend"
    groups:
      all-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # puppeteer is pinned EXACT to match the Docker image's bundled Chrome
      # (SCRAPER.md) — ANY bump breaks the scrapers, so never raise it.
      - dependency-name: "puppeteer*"
